name: Zentra CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Test ──────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zentra_test
          POSTGRES_USER: zentra
          POSTGRES_PASSWORD: zentra_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://zentra:zentra_secret@localhost:5432/zentra_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test_secret_key_for_ci
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Dependencies o'rnatish
        run: pip install -e ".[dev]"

      - name: Ruff (linting)
        run: ruff check app/

      - name: Ruff (formatting)
        run: ruff format --check app/

      - name: MyPy (type check)
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true  # Hozircha warning

      - name: Migration tekshirish
        run: alembic check

      - name: Testlar
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  # ─── Build ─────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            zentraapp/api:latest
            zentraapp/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Server deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/zentra
            git pull origin main
            docker compose pull
            docker compose up -d --no-deps api worker beat
            docker compose exec api alembic upgrade head
            echo "✅ Deploy muvaffaqiyatli!"
